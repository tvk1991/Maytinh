<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Máy Tính Tiền Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        
        .calculator {
            background: white;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 0;
            overflow: hidden;
        }
        
        /* Màn hình hiển thị */
        .display {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        
        .target-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #6c757d;
            border-bottom: 1px dashed #dee2e6;
            padding-bottom: 6px;
        }
        
        #targetDisplay {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #4263eb;
            font-size: 16px;
        }
        
        .input-row {
            font-size: 48px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #212529;
            min-height: 70px;
            word-wrap: break-word;
            line-height: 1.2;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            border-top: 1px dashed #dee2e6;
            padding-top: 6px;
        }
        
        .total-label {
            color: #6c757d;
            font-weight: 500;
            font-size: 16px;
        }
        
        #totalDisplay {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: #40c057;
            font-size: 24px;
        }
        
        /* Thông báo kết quả */
        .result-toast {
            background: #212529;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.2s;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .result-toast.show {
            opacity: 1;
        }
        
        .result-toast.success {
            background: #2b8a3e;
        }
        
        .result-toast.error {
            background: #e03131;
        }
        
        .result-toast.warning {
            background: #e8590c;
        }
        
        /* Bàn phím - layout mới */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            flex: 1;
            padding-bottom: 20px;
            align-content: stretch;
        }
        
        .key {
            background: #f1f3f5;
            border: none;
            border-radius: 20px;
            font-size: 28px;
            font-weight: 600;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            height: 100%;
            min-height: 70px;
        }
        
        .key:active {
            transform: scale(0.95);
            background: #e9ecef;
        }
        
        /* Phím số */
        .key.number {
            background: #f1f3f5;
            color: #212529;
        }
        
        /* Phím xóa */
        .key.delete {
            background: #ff8787;
            color: white;
            font-size: 26px;
        }
        
        .key.delete:active {
            background: #ff6b6b;
        }
        
        /* Phím cộng */
        .key.add {
            background: #4dabf7;
            color: white;
        }
        
        .key.add:active {
            background: #339af0;
        }
        
        /* Phím bằng - chuyển xuống hàng 4 */
        .key.equals {
            background: #51cf66;
            color: white;
            font-size: 32px;
        }
        
        .key.equals:active {
            background: #40c057;
        }
        
        /* Phím C - chuyển xuống hàng 4 */
        .key.clear {
            background: #ff8787;
            color: white;
        }
        
        .key.clear:active {
            background: #ff6b6b;
        }
        
        /* Phím 00 */
        .key.double-zero {
            background: #ff922b;
            color: white;
        }
        
        .key.double-zero:active {
            background: #fd7e14;
        }
        
        /* Phím chấm */
        .key.dot {
            background: #9775fa;
            color: white;
        }
        
        .key.dot:active {
            background: #845ef7;
        }
        
        /* Animation rung */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        
        /* Điều chỉnh cho iPhone notch */
        @supports (padding: max(0px)) {
            .calculator {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
            }
        }
        
        /* Màn hình nhỏ */
        @media (max-height: 670px) {
            .input-row {
                font-size: 40px;
                min-height: 60px;
            }
            
            .key {
                font-size: 24px;
                min-height: 60px;
            }
        }
        
        @media (max-height: 570px) {
            .calculator {
                padding: 10px;
            }
            
            .input-row {
                font-size: 36px;
                min-height: 50px;
            }
            
            .key {
                font-size: 22px;
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- Màn hình hiển thị -->
        <div class="display">
            <div class="target-row">
                <span>Cần kiểm tra:</span>
                <span id="targetDisplay">0</span>
            </div>
            <div class="input-row" id="inputDisplay">0</div>
            <div class="total-row">
                <span class="total-label">Tổng:</span>
                <span id="totalDisplay">0</span>
            </div>
        </div>
        
        <!-- Thông báo kết quả -->
        <div class="result-toast" id="resultToast"></div>
        
        <!-- Bàn phím - layout mới với C và = ở hàng 4 -->
        <div class="keypad">
            <!-- Hàng 1: 7 8 9 ⌫ -->
            <button class="key number" data-value="7">7</button>
            <button class="key number" data-value="8">8</button>
            <button class="key number" data-value="9">9</button>
            <button class="key delete" data-action="delete">⌫</button>
            
            <!-- Hàng 2: 4 5 6 + -->
            <button class="key number" data-value="4">4</button>
            <button class="key number" data-value="5">5</button>
            <button class="key number" data-value="6">6</button>
            <button class="key add" data-action="add">+</button>
            
            <!-- Hàng 3: 1 2 3 . -->
            <button class="key number" data-value="1">1</button>
            <button class="key number" data-value="2">2</button>
            <button class="key number" data-value="3">3</button>
            <button class="key dot" data-value=".">.</button>
            
            <!-- Hàng 4: 0 00 C = -->
            <button class="key number" data-value="0">0</button>
            <button class="key double-zero" data-value="00">00</button>
            <button class="key clear" data-action="clear">C</button>
            <button class="key equals" data-action="check">=</button>
        </div>
    </div>

    <script>
        // State
        let currentInput = '';
        let total = 0;
        let targetValue = 0;
        let isTargetSet = false;
        let itemCount = 0;
        
        // DOM elements
        const inputDisplay = document.getElementById('inputDisplay');
        const targetDisplay = document.getElementById('targetDisplay');
        const totalDisplay = document.getElementById('totalDisplay');
        const resultToast = document.getElementById('resultToast');
        const calculator = document.querySelector('.calculator');
        
        // Audio
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        // Xử lý click phím
        document.querySelectorAll('.key').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                initAudio();
                
                const value = btn.dataset.value;
                const action = btn.dataset.action;
                
                if (value) {
                    if (!isTargetSet) {
                        appendTarget(value);
                    } else {
                        appendInput(value);
                    }
                } else if (action) {
                    switch(action) {
                        case 'delete':
                            if (!isTargetSet) {
                                deleteTargetChar();
                            } else {
                                deleteInputChar();
                            }
                            break;
                        case 'add':
                            addItem();
                            break;
                        case 'check':
                            checkTotal();
                            break;
                        case 'clear':
                            clearAll();
                            break;
                    }
                }
            });
        });
        
        // Nhập số target
        function appendTarget(num) {
            if (num === '.') {
                if (!targetValue.toString().includes('.')) {
                    targetValue = targetValue === 0 ? '0.' : targetValue + '.';
                }
            } else if (num === '00') {
                targetValue = targetValue === 0 ? 0 : targetValue + '00';
            } else {
                targetValue = targetValue === 0 ? num : targetValue + num;
            }
            
            targetValue = parseFloat(targetValue.toString().replace(/^0+/, '') || '0');
            targetDisplay.textContent = formatNumber(targetValue);
            hideToast();
        }
        
        // Nhập input mặt hàng
        function appendInput(num) {
            if (num === '.') {
                if (!currentInput.includes('.')) {
                    currentInput = currentInput === '' || currentInput === '0' ? '0.' : currentInput + '.';
                }
            } else if (num === '00') {
                currentInput = currentInput === '' || currentInput === '0' ? '0' : currentInput + '00';
            } else {
                currentInput = currentInput === '0' ? num : currentInput + num;
            }
            
            inputDisplay.textContent = formatNumber(currentInput || '0');
            hideToast();
        }
        
        function deleteTargetChar() {
            let str = targetValue.toString();
            if (str.length > 1) {
                targetValue = parseFloat(str.slice(0, -1));
            } else {
                targetValue = 0;
            }
            targetDisplay.textContent = formatNumber(targetValue);
        }
        
        function deleteInputChar() {
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                inputDisplay.textContent = formatNumber(currentInput || '0');
            }
        }
        
        // Thêm mặt hàng
        function addItem() {
            if (!isTargetSet) {
                if (targetValue === 0) {
                    showToast('Nhập số cần kiểm tra', 'warning');
                    return;
                }
                isTargetSet = true;
                targetDisplay.textContent = formatNumber(targetValue);
                showToast('✓ Đã ghi nhớ', 'success');
                return;
            }
            
            if (currentInput === '' || currentInput === '0' || currentInput === '.') {
                showToast('Nhập giá trị', 'warning');
                return;
            }
            
            const value = parseFloat(currentInput);
            if (isNaN(value) || value <= 0) {
                showToast('Không hợp lệ', 'warning');
                return;
            }
            
            total += value;
            itemCount++;
            
            totalDisplay.textContent = formatNumber(total);
            
            currentInput = '';
            inputDisplay.textContent = '0';
            
            showToast(`+ ${formatNumber(value)}`, 'success');
        }
        
        // Kiểm tra tổng
        function checkTotal() {
            if (!isTargetSet || targetValue === 0) {
                showToast('Chưa có số kiểm tra', 'warning');
                return;
            }
            
            if (itemCount === 0) {
                showToast('Chưa có mặt hàng', 'warning');
                return;
            }
            
            const diff = total - targetValue;
            const isCorrect = Math.abs(diff) <= 0.01;
            
            if (!isCorrect) {
                calculator.classList.add('shake');
                playErrorSound();
                
                const diffText = (diff > 0 ? '+' : '') + formatNumber(Math.abs(diff));
                showToast(`SAI! ${diffText}`, 'error');
                
                setTimeout(() => {
                    calculator.classList.remove('shake');
                }, 400);
            } else {
                showToast('ĐÚNG!', 'success');
            }
        }
        
        function clearAll() {
            currentInput = '';
            total = 0;
            targetValue = 0;
            isTargetSet = false;
            itemCount = 0;
            
            inputDisplay.textContent = '0';
            targetDisplay.textContent = '0';
            totalDisplay.textContent = '0';
            
            hideToast();
        }
        
        function formatNumber(num) {
            if (num === 0) return '0';
            return Number(num).toLocaleString('vi-VN');
        }
        
        function showToast(message, type = 'info') {
            resultToast.textContent = message;
            resultToast.className = `result-toast show ${type}`;
        }
        
        function hideToast() {
            resultToast.classList.remove('show');
        }
        
        function playErrorSound() {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.15);
        }
    </script>
</body>
</html>
